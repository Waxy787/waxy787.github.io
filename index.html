<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Beni Affet ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 1;
    }

    .container {
      text-align: center;
      color: white;
      z-index: 2;
      animation: fadeIn 2s ease-in-out forwards;
    }

    h1 {
      font-size: 4rem;
      font-family: 'Great Vibes', cursive;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,255,255,0.9);
      animation: glow 2s infinite alternate;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 30px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }

    button {
      padding: 15px 35px;
      font-size: 1.3rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      font-weight: bold;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    .heart {
      position: absolute;
      font-size: 28px;
      animation: floatUp 5s linear forwards;
      color: #ff3860;
      text-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-800px) scale(2); opacity: 0; }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff, 0 0 20px #ff4a4a, 0 0 30px #ff0066; }
      to { text-shadow: 0 0 20px #fff, 0 0 30px #ff3366, 0 0 40px #ff1a75; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Arka plan parlayan yıldız efekti */
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(1); }
      to { opacity: 1; transform: scale(1.5); }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>Beni Affet ❤️</h1>
    <h2>Sensiz olmuyor... Hatalıyım, ama kalbim hep seninle.</h2>
    <button onclick="sendHearts()">Seni Seviyorum 💕</button>
  </div>

  <script>
    function sendHearts() {
      for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.classList.add("heart");
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.bottom = "0px";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 5000);
      }
    }

    // Yıldız arka plan
    for (let i = 0; i < 50; i++) {
      let star = document.createElement("div");
      star.classList.add("star");
      star.style.top = Math.random() * window.innerHeight + "px";
      star.style.left = Math.random() * window.innerWidth + "px";
      star.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(star);
    }
  </script>
</body>
</html>
