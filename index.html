<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Beni Affet ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      padding: 20px;
      color: white;
      animation: fadeIn 1.5s ease-in-out forwards;
    }

    h1 {
      font-size: 2.5rem;
      font-family: 'Great Vibes', cursive;
      margin-bottom: 15px;
      text-shadow: 0 0 15px rgba(255,255,255,0.8);
      animation: glow 2s infinite alternate;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    button {
      padding: 12px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      font-weight: bold;
      box-shadow: 0 5px 12px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 7px 15px rgba(0,0,0,0.4);
    }

    .heart {
      position: fixed;
      bottom: 0;
      font-size: 20px;
      animation: floatUp 3s linear forwards;
      color: #ff3860;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-500px) scale(1.5); opacity: 0; }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff, 0 0 20px #ff4a4a; }
      to { text-shadow: 0 0 20px #fff, 0 0 30px #ff3366; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1rem; }
      button { font-size: 0.9rem; padding: 10px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Beni Affet ❤️</h1>
    <h2>Sensiz olmuyor... Hatalıyım, ama kalbim hep seninle.</h2>
    <button onclick="sendHearts()">Seni Seviyorum 💕</button>
  </div>

  <script>
    function sendHearts() {
      for (let i = 0; i < 10; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.classList.add("heart");
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.fontSize = Math.random() * 15 + 20 + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 3000);
      }
    }
  </script>
</body>
</html>
